<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumenia</title>
  <link rel="icon" type="image/png" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663481944359/RUsrs92uGomFyiMKqRx9VH/lumenia-logo-NJJJRaxGtfPDR5ETsYCp6n.webp"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #0066CC; --blue-light: #eff6ff; --muted: #6b7280; --border: #e5e7eb; }
    body { font-family: 'Inter', sans-serif; color: #1a1a2e; background: #f8fafc; min-height: 100vh; }

    /* ── HEADER ── */
    header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.96); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 68px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo img { width: 38px; border-radius: 10px; }
    .logo-text { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--blue); }
    nav a { color: #374151; text-decoration: none; font-weight: 500; font-size: .92rem; padding: 8px 14px; border-radius: 8px; transition: background .15s, color .15s; margin-left: 4px; }
    nav a:hover { background: var(--blue-light); color: var(--blue); }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: #374151; border-radius: 2px; transition: all .25s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; position: fixed; top: 68px; left: 0; right: 0; background: #fff; border-bottom: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,.08); padding: 16px 24px 24px; z-index: 99; flex-direction: column; gap: 4px; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { display: block; color: #374151; text-decoration: none; font-weight: 500; font-size: 1.05rem; padding: 12px 16px; border-radius: 10px; }
    .mobile-menu a:hover { background: var(--blue-light); color: var(--blue); }
    .mobile-menu .m-nl { background: var(--blue); color: #fff !important; text-align: center; margin-top: 8px; border-radius: 12px; }
    @media (max-width: 767px) { .hamburger { display: flex; } nav { display: none; } header { padding: 0 16px; } }

    /* ── CONTENU ── */
    .container { max-width: 820px; margin: 48px auto; padding: 0 32px; }
    @media (max-width: 767px) { .container { padding: 0 20px; margin: 32px auto; } }
    .back { display: inline-flex; align-items: center; gap: 6px; color: var(--blue); text-decoration: none; font-weight: 500; font-size: .92rem; margin-bottom: 32px; }
    .back:hover { text-decoration: underline; }

    /* ── MARKDOWN RENDU ── */
    .content h1 { font-family: 'Poppins', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 16px; line-height: 1.25; }
    .content h2 { font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 700; margin: 36px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
    .content h3 { font-family: 'Poppins', sans-serif; font-size: 1.15rem; font-weight: 600; margin: 28px 0 8px; }
    .content p { margin-bottom: 16px; line-height: 1.8; color: #374151; }
    .content ul, .content ol { margin: 0 0 16px 24px; line-height: 1.8; color: #374151; }
    .content li { margin-bottom: 6px; }
    .content blockquote { border-left: 4px solid var(--blue); background: var(--blue-light); margin: 24px 0; padding: 16px 20px; border-radius: 0 8px 8px 0; color: #1e40af; }
    .content blockquote p { color: #1e40af; margin: 0; }
    .content code { background: #f1f5f9; padding: 2px 7px; border-radius: 5px; font-size: .9em; font-family: 'Courier New', monospace; color: #d63384; }
    .content pre { background: #1e293b; color: #e2e8f0; padding: 20px; border-radius: 12px; overflow-x: auto; margin-bottom: 20px; }
    .content pre code { background: none; padding: 0; color: inherit; }
    .content a { color: var(--blue); }
    .content a:hover { text-decoration: underline; }
    .content img { max-width: 100%; border-radius: 12px; margin: 16px 0; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .content table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: .95rem; }
    .content th { background: var(--blue); color: #fff; padding: 10px 14px; text-align: left; font-weight: 600; }
    .content td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: #374151; }
    .content tr:hover td { background: var(--blue-light); }
    .content strong { font-weight: 700; color: #1a1a2e; }

    /* ── ÉTATS ── */
    .loading { text-align: center; padding: 80px 20px; color: var(--muted); }
    .loading .spin { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 12px; padding: 24px; text-align: center; color: #be123c; }
    .error-box h2 { font-family: 'Poppins', sans-serif; margin-bottom: 8px; }

    /* ── FOOTER ── */
    footer { background: #1a1a2e; color: #9ca3af; padding: 32px; text-align: center; font-size: .85rem; margin-top: 80px; }
    footer a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663481944359/RUsrs92uGomFyiMKqRx9VH/lumenia-logo-NJJJRaxGtfPDR5ETsYCp6n.webp" alt="Lumenia"/>
    <span class="logo-text">Lumenia</span>
  </a>
  <nav>
    <a href="/articles">Articles</a>
    <a href="/formations">Formations</a>
    <a href="/videos">Vidéos</a>
    <a href="/communaute">Communauté</a>
  </nav>
  <button class="hamburger" id="hbg" aria-label="Menu"><span></span><span></span><span></span></button>
</header>

<div class="mobile-menu" id="mob">
  <a href="/">Accueil</a>
  <a href="/articles">Articles</a>
  <a href="/formations">Formations</a>
  <a href="/videos">Vidéos</a>
  <a href="/communaute">Communauté</a>
  <a href="/a-propos">À propos</a>
  <a href="/contact">Contact</a>
  <a href="/contact" class="m-nl">Newsletter</a>
</div>

<div class="container">
  <a class="back" id="back-link" href="/">← Retour</a>
  <div id="output" class="content">
    <div class="loading">
      <div class="spin"></div>
      <p>Chargement du contenu...</p>
    </div>
  </div>
</div>

<footer>
  &copy; 2025 <a href="/">Lumenia</a> &mdash; Savoir &amp; Inspiration
</footer>

<script>
  // ── Hamburger ──
  var b = document.getElementById('hbg'), m = document.getElementById('mob');
  b.addEventListener('click', function () { var o = m.classList.toggle('open'); b.classList.toggle('open', o); });
  document.addEventListener('click', function (e) { if (!b.contains(e.target) && !m.contains(e.target)) { m.classList.remove('open'); b.classList.remove('open'); } });

  // ── Chargement du fichier Markdown ──
  var params = new URLSearchParams(window.location.search);
  var file = params.get('file');

  var output = document.getElementById('output');
  var backLink = document.getElementById('back-link');

  if (!file) {
    output.innerHTML = '<div class="error-box"><h2>Fichier non spécifié</h2><p>Ajoutez <code>?file=chemin/vers/fichier.md</code> dans l\'URL.</p></div>';
  } else {
    // Lien retour : dossier parent du fichier
    var parts = file.split('/');
    var section = parts.length > 1 ? '/' + parts[0] : '/';
    backLink.href = section;
    backLink.textContent = '← ' + (parts[0].charAt(0).toUpperCase() + parts[0].slice(1));

    // Charger le fichier (raw=1 pour éviter la conversion serveur)
    fetch('/' + file + '?raw=1')
      .then(function (res) {
        if (!res.ok) throw new Error('Fichier introuvable : ' + file);
        return res.text();
      })
      .then(function (text) {
        // Extraire le titre pour la balise <title>
        var titleMatch = text.match(/^#\s+(.+)$/m);
        if (titleMatch) document.title = titleMatch[1] + ' - Lumenia';

        // Configurer marked
        marked.setOptions({ breaks: true, gfm: true });

        output.innerHTML = marked.parse(text);
      })
      .catch(function (err) {
        output.innerHTML = '<div class="error-box"><h2>Fichier introuvable</h2><p>' + err.message + '</p></div>';
      });
  }
</script>

</body>
</html>
