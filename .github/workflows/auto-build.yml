name: Auto Build Lumenia Indexes

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'
      - 'formations/**'
      - 'videos/**'
      - 'communaute/**'
      - 'lumenia-build.js'
  workflow_dispatch: # Permet de lancer le build manuellement si besoin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour les dates de modification

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build script
        run: node lumenia-build.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add **/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update data.json indexes [skip ci]"
            git push
          fi
