name: Auto Build Lumenia

on:
  push:
    paths:
      - "articles/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le repo
        uses: actions/checkout@v3

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Lancer le script
        run: node scripts/lumenia-build.js

      - name: Commit automatique
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Mise à jour automatique des articles" || echo "Pas de changements"
          git push
