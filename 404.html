<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable - Lumenia</title>
  <link rel="icon" type="image/svg+xml" href="/attached_assets/lumenia-icon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f7ff, #e8f4fd);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 48px; }
    .logo img { width: 40px; border-radius: 10px; }
    .logo span { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.4rem; color: #0066CC; }
    .code { font-family: 'Poppins', sans-serif; font-size: 6rem; font-weight: 800; color: #0066CC; line-height: 1; }
    h1 { font-family: 'Poppins', sans-serif; font-size: 1.6rem; font-weight: 700; margin: 16px 0 10px; color: #1a1a2e; }
    p { color: #6b7280; font-size: 1rem; max-width: 400px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block; background: #0066CC; color: #fff;
      text-decoration: none; padding: 14px 32px; border-radius: 12px;
      font-weight: 600; font-size: 1rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #004fa3; }

    /* ── HAMBURGER MOBILE ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .hamburger:hover { background: #f3f4f6; }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: #374151; border-radius: 2px;
      transition: all 0.25s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none;
      position: fixed;
      top: 68px; left: 0; right: 0;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 16px 24px 24px;
      z-index: 99;
      flex-direction: column;
      gap: 4px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      display: block;
      color: #374151; text-decoration: none;
      font-weight: 500; font-size: 1.05rem;
      padding: 12px 16px; border-radius: 10px;
      transition: background 0.15s, color 0.15s;
    }
    .mobile-menu a:hover { background: #eff6ff; color: #0066CC; }
    .mobile-menu .m-newsletter {
      background: #0066CC; color: #fff !important;
      text-align: center; margin-top: 8px; border-radius: 12px;
    }
    .mobile-menu .m-newsletter:hover { background: #004fa3 !important; }
    @media (max-width: 767px) {
      .hamburger { display: flex; }
      nav { display: none; }
    }
  </style>
</head>
<body>
  <a class="logo" href="/">
    <img src="/attached_assets/lumenia-icon.svg" alt=""/>
    <span>Lumenia</span>
  </a>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a class="btn" href="/">Retour à l'accueil</a>
</body>
</html>
