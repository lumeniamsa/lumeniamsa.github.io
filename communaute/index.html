<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Communaut&#233; - Lumenia</title>
  <link rel="icon" type="image/png" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663481944359/RUsrs92uGomFyiMKqRx9VH/lumenia-logo-NJJJRaxGtfPDR5ETsYCp6n.webp"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#0066CC;--blue-light:#eff6ff;--muted:#6b7280;--border:#e5e7eb}
    body{font-family:'Inter',sans-serif;color:#1a1a2e;background:#f8fafc;min-height:100vh}
    header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo img{width:38px;border-radius:10px}
    .logo-text{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.3rem;color:var(--blue)}
    nav a{color:#374151;text-decoration:none;font-weight:500;font-size:.92rem;padding:8px 14px;border-radius:8px;transition:background .15s,color .15s;margin-left:4px}
    nav a:hover{background:var(--blue-light);color:var(--blue)}
    .hero{background:linear-gradient(135deg,#f0f7ff,#e8f4fd);padding:72px 32px;text-align:center}
    .hero-icon{font-size:3rem;margin-bottom:16px}
    .hero h1{font-family:'Poppins',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:12px}
    .hero p{color:var(--muted);font-size:1.05rem;max-width:480px;margin:0 auto;line-height:1.7}
    .container{max-width:900px;margin:48px auto;padding:0 32px}
    .back{display:inline-flex;align-items:center;gap:6px;color:var(--blue);text-decoration:none;font-weight:500;font-size:.92rem;margin-bottom:12px}
    .back:hover{text-decoration:underline}
    .listing-count{color:var(--muted);font-size:.9rem;margin-bottom:24px}
    .category-title{font-size:1.1rem;font-weight:700;color:var(--blue);margin:36px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--border);text-transform:capitalize}
    .listing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:8px}
    .listing-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;text-decoration:none;color:#1a1a2e;display:flex;flex-direction:column;gap:8px;transition:box-shadow .2s,border-color .2s,transform .15s}
    .listing-card:hover{box-shadow:0 8px 30px rgba(0,102,204,.12);border-color:var(--blue);transform:translateY(-2px)}
    .listing-card .icon{font-size:1.5rem}
    .listing-card .name{font-family:'Poppins',sans-serif;font-weight:600;font-size:1rem}
    .listing-card .type{font-size:.78rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
    .empty{background:#fff;border:2px dashed var(--border);border-radius:16px;padding:56px 24px;text-align:center;color:var(--muted)}
    footer{background:#1a1a2e;color:#9ca3af;padding:32px;text-align:center;font-size:.85rem;margin-top:80px}
    footer a{color:var(--blue);text-decoration:none}
    .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;transition:background .15s}
    .hamburger:hover{background:#f3f4f6}
    .hamburger span{display:block;width:24px;height:2px;background:#374151;border-radius:2px;transition:all .25s}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:16px 24px 24px;z-index:99;flex-direction:column;gap:4px}
    .mobile-menu.open{display:flex}
    .mobile-menu a{display:block;color:#374151;text-decoration:none;font-weight:500;font-size:1.05rem;padding:12px 16px;border-radius:10px;transition:background .15s,color .15s}
    .mobile-menu a:hover{background:#eff6ff;color:#0066CC}
    .mobile-menu .m-newsletter{background:#0066CC;color:#fff!important;text-align:center;margin-top:8px;border-radius:12px}
    .mobile-menu .m-newsletter:hover{background:#004fa3!important}
    @media(max-width:767px){header{padding:0 16px}.hero{padding:48px 20px}.container{padding:0 20px}.hamburger{display:flex}nav{display:none}}
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663481944359/RUsrs92uGomFyiMKqRx9VH/lumenia-logo-NJJJRaxGtfPDR5ETsYCp6n.webp" alt="Lumenia"/>
    <span class="logo-text">Lumenia</span>
  </a>
  <nav>
    <a href="/articles">Articles</a>
    <a href="/formations">Formations</a>
    <a href="/videos">Vid&#233;os</a>
    <a href="/communaute">Communaut&#233;</a>
  </nav>
  <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>
<div class="mobile-menu" id="mobile-menu">
  <a href="/">Accueil</a>
  <a href="/articles">Articles</a>
  <a href="/formations">Formations</a>
  <a href="/videos">Vid&#233;os</a>
  <a href="/communaute">Communaut&#233;</a>
  <a href="/a-propos">&#192; propos</a>
  <a href="/contact">Contact</a>
  <a href="/contact" class="m-newsletter">Newsletter</a>
</div>

<div class="hero">
  <div class="hero-icon">🤝</div>
  <h1>Communaut&#233;</h1>
  <p>Ressources et &#233;changes de la communaut&#233;.</p>
</div>

<div class="container">
  <a class="back" href="/">&#8592; Accueil</a>
  <p class="listing-count" id="listing-count">Chargement&hellip;</p>
  <div id="listing-container"></div>
</div>

<footer>
  &copy; 2025 <a href="/">Lumenia</a> &mdash; Savoir &amp; Inspiration
</footer>

<script>
  var btn = document.getElementById('hamburger');
  var menu = document.getElementById('mobile-menu');
  btn.addEventListener('click', function() {
    var open = menu.classList.toggle('open');
    btn.classList.toggle('open', open);
    btn.setAttribute('aria-expanded', open);
  });
  document.addEventListener('click', function(e) {
    if (!btn.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', false);
    }
  });
</script>
<script src="/listing.js"></script>
</body>
</html>
