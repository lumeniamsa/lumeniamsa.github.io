<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Lumenia</title>

  <!-- PWA -->

  <link rel="icon" type="image/png" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663481944359/RUsrs92uGomFyiMKqRx9VH/lumenia-logo-NJJJRaxGtfPDR5ETsYCp6n.webp"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #0066CC; --blue-light: #eff6ff; --blue-dark: #004fa3; --muted: #6b7280; --border: #e5e7eb; }
    body { font-family: 'Inter', sans-serif; color: #1a1a2e; background: #f8fafc; }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 68px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo img { width: 38px; border-radius: 10px; }
    .logo-text { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--blue); }
    nav a {
      color: #374151; text-decoration: none; font-weight: 500;
      font-size: 0.92rem; padding: 8px 14px; border-radius: 8px;
      transition: background 0.15s, color 0.15s; margin-left: 4px;
    }
    nav a:hover { background: var(--blue-light); color: var(--blue); }
    .hero { background: linear-gradient(135deg, #f0f7ff, #e8f4fd); padding: 72px 32px; text-align: center; }
    .hero h1 { font-family: 'Poppins', sans-serif; font-size: 2.4rem; font-weight: 800; margin-bottom: 16px; }
    .hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto; line-height: 1.7; }
    .container { max-width: 600px; margin: 60px auto; padding: 0 24px; }
    .card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 20px; padding: 40px;
    }
    label { display: block; font-weight: 600; font-size: 0.92rem; margin-bottom: 6px; margin-top: 20px; }
    label:first-child { margin-top: 0; }
    input, textarea, select {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-family: 'Inter', sans-serif; font-size: 0.95rem;
      color: #1a1a2e; background: #f8fafc; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); background: #fff; }
    textarea { height: 130px; resize: vertical; }
    .btn {
      display: inline-block; background: var(--blue); color: #fff;
      border: none; padding: 14px 32px; border-radius: 12px;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 1rem;
      cursor: pointer; margin-top: 24px; width: 100%;
      transition: background 0.2s;
    }
    .btn:hover { background: #004fa3; }
    .contact-info { margin-top: 40px; display: flex; flex-direction: column; gap: 16px; }
    .info-row { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 0.95rem; }
    .info-row .icon { font-size: 1.3rem; }
    footer { background: #1a1a2e; color: #9ca3af; padding: 32px; text-align: center; font-size: 0.85rem; margin-top: 80px; }
    footer a { color: var(--blue); text-decoration: none; }

    @media(max-width:767px){
      header{padding:0 16px}
      nav a{display:none}
      .hero{padding:48px 20px}
      .container{padding:0 20px}
      body{padding-bottom:72px}
    }

    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:150;align-items:stretch;justify-content:space-around}
    @media(max-width:767px){.mobile-bottom-nav{display:flex}}
    .mobile-bottom-nav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex:1;color:var(--muted);text-decoration:none;font-size:.68rem;font-weight:600;letter-spacing:.02em;transition:color .18s,transform .15s;padding:6px 0;border-radius:12px;margin:6px 4px}
    .mobile-bottom-nav a:hover{color:var(--blue);transform:translateY(-2px)}
    .mobile-bottom-nav a.active{color:var(--blue)}
    .mobile-bottom-nav a.active .nav-icon-wrap{background:var(--blue-light)}
    .nav-icon-wrap{width:38px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:background .18s}
    .mobile-bottom-nav a:hover .nav-icon-wrap{background:var(--blue-light)}
    .nav-icon{width:22px;height:22px;fill:currentColor}
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663481944359/RUsrs92uGomFyiMKqRx9VH/lumenia-logo-NJJJRaxGtfPDR5ETsYCp6n.webp" alt="Lumenia"/>
    <span class="logo-text">Lumenia</span>
  </a>
  <nav>
    <a href="/articles">Articles</a>
    <a href="/formations">Formations</a>
    <a href="/videos">Vidéos</a>
    <a href="/a-propos">À propos</a>
  </nav>
</header>

<div class="hero">
  <h1>Contactez-nous</h1>
  <p>Une question, une suggestion ou une idée de collaboration ? Écrivez-nous !</p>
</div>

<div class="container">
  <div class="card">
    <form action="mailto:contact@lumenia.fr" method="post" enctype="text/plain">
      <label for="nom">Votre nom</label>
      <input type="text" id="nom" name="nom" placeholder="Ex: Jean Dupont" required/>

      <label for="email">Votre email</label>
      <input type="email" id="email" name="email" placeholder="Ex: jean@email.com" required/>

      <label for="sujet">Sujet</label>
      <select id="sujet" name="sujet">
        <option>Question générale</option>
        <option>Proposition d'article</option>
        <option>Proposition de formation</option>
        <option>Partenariat</option>
        <option>Autre</option>
      </select>

      <label for="message">Votre message</label>
      <textarea id="message" name="message" placeholder="Votre message..." required></textarea>

      <button class="btn" type="submit">Envoyer le message</button>
    </form>

    <div class="contact-info">
      <div class="info-row"><span class="icon">📧</span> contact@lumenia.fr</div>
      <div class="info-row"><span class="icon">🌍</span> lumeniamsa.github.io</div>
    </div>
  </div>
</div>

<footer>
  &copy; 2025 <a href="/">Lumenia</a> &mdash; Savoir &amp; Inspiration
</footer>

<nav class="mobile-bottom-nav" aria-label="Navigation principale">
  <a href="/" data-path="/">
    <span class="nav-icon-wrap"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></span>
    Accueil
  </a>
  <a href="/articles/" data-path="/articles">
    <span class="nav-icon-wrap"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></span>
    Articles
  </a>
  <a href="/formations/" data-path="/formations">
    <span class="nav-icon-wrap"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg></span>
    Formations
  </a>
  <a href="/videos/" data-path="/videos">
    <span class="nav-icon-wrap"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></span>
    Vidéos
  </a>
  <a href="/contact/" data-path="/contact">
    <span class="nav-icon-wrap"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></span>
    Contact
  </a>
</nav>

</body>
</html>
