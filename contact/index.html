<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Lumenia</title>
  <link rel="icon" type="image/svg+xml" href="/attached_assets/lumenia-icon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #0066CC; --blue-light: #eff6ff; --muted: #6b7280; --border: #e5e7eb; }
    body { font-family: 'Inter', sans-serif; color: #1a1a2e; background: #f8fafc; }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 68px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo img { width: 38px; border-radius: 10px; }
    .logo-text { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--blue); }
    nav a {
      color: #374151; text-decoration: none; font-weight: 500;
      font-size: 0.92rem; padding: 8px 14px; border-radius: 8px;
      transition: background 0.15s, color 0.15s; margin-left: 4px;
    }
    nav a:hover { background: var(--blue-light); color: var(--blue); }
    .hero { background: linear-gradient(135deg, #f0f7ff, #e8f4fd); padding: 72px 32px; text-align: center; }
    .hero h1 { font-family: 'Poppins', sans-serif; font-size: 2.4rem; font-weight: 800; margin-bottom: 16px; }
    .hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto; line-height: 1.7; }
    .container { max-width: 600px; margin: 60px auto; padding: 0 24px; }
    .card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 20px; padding: 40px;
    }
    label { display: block; font-weight: 600; font-size: 0.92rem; margin-bottom: 6px; margin-top: 20px; }
    label:first-child { margin-top: 0; }
    input, textarea, select {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-family: 'Inter', sans-serif; font-size: 0.95rem;
      color: #1a1a2e; background: #f8fafc; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); background: #fff; }
    textarea { height: 130px; resize: vertical; }
    .btn {
      display: inline-block; background: var(--blue); color: #fff;
      border: none; padding: 14px 32px; border-radius: 12px;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 1rem;
      cursor: pointer; margin-top: 24px; width: 100%;
      transition: background 0.2s;
    }
    .btn:hover { background: #004fa3; }
    .contact-info { margin-top: 40px; display: flex; flex-direction: column; gap: 16px; }
    .info-row { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 0.95rem; }
    .info-row .icon { font-size: 1.3rem; }
    footer { background: #1a1a2e; color: #9ca3af; padding: 32px; text-align: center; font-size: 0.85rem; margin-top: 80px; }
    footer a { color: var(--blue); text-decoration: none; }

    /* ── HAMBURGER MOBILE ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .hamburger:hover { background: #f3f4f6; }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: #374151; border-radius: 2px;
      transition: all 0.25s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none;
      position: fixed;
      top: 68px; left: 0; right: 0;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 16px 24px 24px;
      z-index: 99;
      flex-direction: column;
      gap: 4px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      display: block;
      color: #374151; text-decoration: none;
      font-weight: 500; font-size: 1.05rem;
      padding: 12px 16px; border-radius: 10px;
      transition: background 0.15s, color 0.15s;
    }
    .mobile-menu a:hover { background: #eff6ff; color: #0066CC; }
    .mobile-menu .m-newsletter {
      background: #0066CC; color: #fff !important;
      text-align: center; margin-top: 8px; border-radius: 12px;
    }
    .mobile-menu .m-newsletter:hover { background: #004fa3 !important; }
    @media (max-width: 767px) {
      .hamburger { display: flex; }
      nav { display: none; }
    }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img src="/attached_assets/lumenia-icon.svg" alt=""/>
    <span class="logo-text">Lumenia</span>
  </a>
  <nav>
    <a href="/articles">Articles</a>
    <a href="/formations">Formations</a>
    <a href="/videos">Vidéos</a>
    <a href="/a-propos">À propos</a>
  </nav>
</header>
  <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-menu" id="mobile-menu">
    <a href="/">Accueil</a>
    <a href="/articles">Articles</a>
    <a href="/formations">Formations</a>
    <a href="/videos">Vid&#233;os</a>
    <a href="/communaute">Communaut&#233;</a>
    <a href="/a-propos">&#192; propos</a>
    <a href="/contact">Contact</a>
    <a href="/contact" class="m-newsletter">Newsletter</a>
  </div>
  <script>
    var btn = document.getElementById('hamburger');
    var menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', function() {
      var open = menu.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function(e) {
      if (!btn.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('open');
        btn.classList.remove('open');
        btn.setAttribute('aria-expanded', false);
      }
    });
  </script>

<div class="hero">
  <h1>Contactez-nous</h1>
  <p>Une question, une suggestion ou une idée de collaboration ? Écrivez-nous !</p>
</div>

<div class="container">
  <div class="card">
    <form action="mailto:contact@lumenia.fr" method="post" enctype="text/plain">
      <label for="nom">Votre nom</label>
      <input type="text" id="nom" name="nom" placeholder="Ex: Jean Dupont" required/>

      <label for="email">Votre email</label>
      <input type="email" id="email" name="email" placeholder="Ex: jean@email.com" required/>

      <label for="sujet">Sujet</label>
      <select id="sujet" name="sujet">
        <option>Question générale</option>
        <option>Proposition d'article</option>
        <option>Proposition de formation</option>
        <option>Partenariat</option>
        <option>Autre</option>
      </select>

      <label for="message">Votre message</label>
      <textarea id="message" name="message" placeholder="Votre message..." required></textarea>

      <button class="btn" type="submit">Envoyer le message</button>
    </form>

    <div class="contact-info">
      <div class="info-row"><span class="icon">📧</span> contact@lumenia.fr</div>
      <div class="info-row"><span class="icon">🌍</span> lumeniamsa.github.io</div>
    </div>
  </div>
</div>

<footer>
  &copy; 2025 <a href="/">Lumenia</a> &mdash; Savoir &amp; Inspiration
</footer>
</body>
</html>
